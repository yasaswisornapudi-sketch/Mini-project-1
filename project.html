<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Speed Typing Test</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#4facfe,#00f2fe);
transition:0.4s;

}

.container{

width:900px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0px 0px 20px rgba(0,0,0,0.3);

}

h1{

text-align:center;
margin-bottom:20px;
color:#333;

}

.instructions{

background:#f5f5f5;
padding:15px;
border-radius:10px;
margin-bottom:20px;

}

.quote{

font-size:22px;
line-height:40px;
padding:20px;
background:#eef7ff;
border-left:8px solid blue;
border-radius:10px;
margin-bottom:20px;

}

textarea{

width:100%;
height:180px;
padding:15px;
font-size:20px;
border-radius:10px;
border:2px solid gray;
resize:none;

}

.buttons{

margin-top:20px;
display:flex;
justify-content:center;
gap:20px;

}

button{

padding:12px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;

}

.start{

background:green;
color:white;

}

.restart{

background:orange;
color:white;

}

.result{

margin-top:30px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;

}

.box{

background:#f0f0f0;
padding:20px;
text-align:center;
border-radius:10px;
font-size:22px;

}

.timer{

text-align:center;
font-size:30px;
margin:20px;
color:red;

}

.correct{

color:green;

}

.wrong{

color:red;

}

</style>

</head>

<body>

<div class="container">

<h1>⌨️ Advanced Speed Typing Test</h1>

<div class="instructions">

Type the paragraph exactly as shown below.
The timer starts when you click Start.

</div>

<div class="timer">

Time Left:
<span id="time">60</span>

</div>

<div class="quote" id="quote">

Loading...

</div>

<textarea id="input" placeholder="Start typing here..." disabled></textarea>

<div class="buttons">

<button class="start" onclick="startTest()">Start Test</button>

<button class="restart" onclick="restartTest()">Restart</button>

</div>

<div class="result">

<div class="box">

WPM

<h2 id="wpm">0</h2>

</div>

<div class="box">

Accuracy

<h2 id="accuracy">0%</h2>

</div>

<div class="box">

Characters

<h2 id="characters">0</h2>

</div>

<div class="box">

Mistakes

<h2 id="mistakes">0</h2>

</div>

</div>

</div>

<script>

const paragraphs=[

"The future belongs to those who believe in the beauty of their dreams and work hard every day to achieve success.",

"Programming is the art of telling another human what one wants the computer to do using logical instructions.",

"Practice makes a person better every single day because consistent effort creates extraordinary results over time.",

"Typing quickly with high accuracy improves productivity and confidence while working on computers every day.",

"Success comes from discipline dedication patience continuous learning and never giving up despite difficulties."

];

let currentText="";
let timer=60;
let interval;
let started=false;

const quote=document.getElementById("quote");
const input=document.getElementById("input");

function loadParagraph(){

currentText=paragraphs[Math.floor(Math.random()*paragraphs.length)];

quote.innerHTML=currentText;

}

loadParagraph();

function startTest(){

started=true;

timer=60;

document.getElementById("time").innerHTML=timer;

input.disabled=false;

input.value="";

input.focus();

clearInterval(interval);

interval=setInterval(function(){

timer--;

document.getElementById("time").innerHTML=timer;

calculate();

if(timer<=0){

clearInterval(interval);

input.disabled=true;

alert("Time Over!");

}

},1000);

}

input.addEventListener("input",function(){

calculate();

});

function calculate(){

let typed=input.value;

let correct=0;

let mistakes=0;

for(let i=0;i<typed.length;i++){

if(typed[i]==currentText[i]){

correct++;

}else{

mistakes++;

}

}

let accuracy=0;

if(typed.length>0){

accuracy=((correct/typed.length)*100).toFixed(1);

}

let words=typed.trim().split(/\s+/).length;

if(typed.trim()==""){

words=0;

}

let elapsed=60-timer;

if(elapsed==0){

elapsed=1;

}

let wpm=Math.round(words/elapsed*60);

document.getElementById("wpm").innerHTML=wpm;

document.getElementById("accuracy").innerHTML=accuracy+"%";

document.getElementById("characters").innerHTML=typed.length;

document.getElementById("mistakes").innerHTML=mistakes;

if(mistakes==0){

document.body.style.background="linear-gradient(135deg,#00c853,#64dd17)";

}

else if(mistakes<5){

document.body.style.background="linear-gradient(135deg,#ffeb3b,#ffc107)";

}

else{

document.body.style.background="linear-gradient(135deg,#f44336,#e91e63)";

}

if(typed===currentText){

clearInterval(interval);

input.disabled=true;

alert("Congratulations! You completed the typing test.");

}

}

function restartTest(){

clearInterval(interval);

timer=60;

document.getElementById("time").innerHTML=timer;

document.getElementById("wpm").innerHTML=0;

document.getElementById("accuracy").innerHTML="0%";

document.getElementById("characters").innerHTML=0;

document.getElementById("mistakes").innerHTML=0;

document.body.style.background="linear-gradient(135deg,#4facfe,#00f2fe)";

input.disabled=true;

input.value="";

loadParagraph();

}

</script>

</body>
</html>
